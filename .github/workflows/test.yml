name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build + test (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config ccache \
            libpipewire-0.3-dev libpulse-dev \
            libcurl4-openssl-dev libnotify-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            libsndfile1-dev libmpg123-dev \
            jq uuid-runtime iproute2 \
            gcovr

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      # The onnxruntime build is ~20 minutes from scratch; cache the
      # vendored install so steady-state CI does not pay that cost.
      # Key includes the build script hash so changes to the script
      # (e.g. version bump) invalidate the cache.
      - name: Restore onnxruntime cache
        id: cache-onnxruntime
        uses: actions/cache@v4
        with:
          path: vendor/onnxruntime-local
          key: onnxruntime-${{ runner.os }}-${{ hashFiles('scripts/build-onnxruntime.sh') }}

      - name: Build onnxruntime (cache miss)
        if: steps.cache-onnxruntime.outputs.cache-hit != 'true'
        run: ./scripts/build-onnxruntime.sh

      # whisper.cpp / sherpa-onnx models for the full-stack and e2e
      # suites. Auto-downloaded by `recmeet-cli --download-models` on
      # cache miss; cached forever once populated. Path follows the V2
      # split — models live under recmeet-server/ now.
      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/recmeet-server/models
          key: recmeet-models-base-v2

      # ccache shrinks repeat rebuilds from ~5 min to ~30 sec.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          ccache --version
          ccache --zero-stats

      # Phase 2b — strict invariant: no test file may register a stub
      # handler for a production IPC verb. Derives the verb list from
      # src/daemon_handlers.cpp and greps tests/*.cpp for both
      # `server.on("verb"` and `server->on("verb"`. No allowlist.
      - name: Check no stubs shadow production handlers
        run: ./scripts/check-test-stubs.sh

      - name: Build (with tests)
        run: make build RECMEET_BUILD_TESTS=ON

      - name: ccache statistics
        run: ccache --show-stats

      - name: Unit tests (C++ + Go)
        run: make test

      # V2 coexistence grep gate — verifies legacy migration helpers,
      # orphan ServerConfig/ClientConfig conversion helpers, and V1
      # binary names are not regressed into the production tree. Pure
      # grep, < 1 s; gates the build before we spend test minutes.
      - name: V2 coexistence gate
        run: make v2-gate

      # Phase E.6 smoke gate — spawns recmeet-server + recmeet-client in an
      # isolated sandbox and exercises the embedded WebUI's HTTP surface
      # against the live server. Fast (<4s); catches client/WebUI/server
      # integration regressions that unit tests miss. Wired here (after
      # unit tests, before integration) per
      # `agentctx/tasks/test-and-verification-hardening.md` Phase 1.
      #
      # LEGACY_SRC / V2_SRC override the smoke fixture defaults (which
      # point at $HOME/meetings/... and do not exist on CI runners).
      # tests/fixtures/smoke/{legacy_v1,v2_meeting} are empty placeholder
      # dirs — smoke.sh writes its own context.json into the V2 fixture
      # at copy time, and discover_meetings() only requires the directory
      # to exist (see src/meetings_browse.cpp:63).
      - name: Smoke gate (WebUI + server)
        env:
          LEGACY_SRC: ${{ github.workspace }}/tests/fixtures/smoke/legacy_v1
          V2_SRC: ${{ github.workspace }}/tests/fixtures/smoke/v2_meeting
        run: make smoke

      - name: Integration tests (C++)
        run: make integration-cxx

      - name: Integration tests (Go)
        run: make integration-go

      - name: V2 thin-client e2e (TCP)
        run: make integration-e2e

      # Full-stack pipeline disabled on CI runners — the server-spawning
      # tests in tests/test_full_stack_*.cpp spawn a real recmeet-server
      # and run whisper transcription + sherpa-onnx diarization on
      # 3-4 minute fixture audio. The per-test 300s wait_for_terminal
      # budget assumes "90-180s on CI cold start" but real GitHub
      # ubuntu-latest runners (2 vCPU, 7 GB RAM, no GPU) consistently
      # exceed it. Local developers run `make full-stack` to exercise
      # this surface; CI sticks to the gates that fit the runner.
      #
      # Tracked in `agentctx/tasks/feat-v2-full-stack-ci-timeout.md` —
      # candidate fixes are documented there. Until the timeout is
      # addressed structurally, full-stack stays local-only.
      # - name: Full-stack pipeline
      #   run: make full-stack

      # C++ coverage (Phase 1, test-and-verification-hardening).
      # Reconfigures with RECMEET_COVERAGE=ON, rebuilds, reruns the default
      # test scope, produces an HTML report + CSV summary.
      - name: C++ coverage (gcovr)
        run: make cxx-coverage

      # Coverage no-regression gate. Warn-only in Phase 1 (does NOT pass
      # --enforce); the script emits ::warning:: annotations naming any
      # regressed files so they surface in the PR diff view, but the
      # step's exit status is always 0.
      # TODO(phase 1.5): flip to `--enforce` after the baseline settles.
      - name: Coverage no-regression gate (warn-only)
        run: ./scripts/check-coverage.sh

      - name: Surface failing logs (on failure)
        if: failure()
        run: |
          echo "::group::recmeet-server logs"
          find ~/.local/share/recmeet-server/logs -type f -printf '\n=== %p ===\n' -exec tail -200 {} \; 2>/dev/null || echo "(no V2 server logs)"
          # Also tail V1-path logs in case a regression test still
          # writes there.
          find ~/.local/share/recmeet/logs -type f -printf '\n=== %p ===\n' -exec tail -200 {} \; 2>/dev/null || true
          echo "::endgroup::"
